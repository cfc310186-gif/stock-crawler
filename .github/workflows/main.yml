name: Daily Stock Crawler & Notify

on:
  schedule:
    # 目標台灣時間 19:30 (UTC 11:30)
    # 實際排在 UTC 11:07，因為 GitHub Actions 在整點/半點 (:00, :30)
    # runner 佇列極度壅塞，常被延遲 30 分鐘以上；改成冷門分鐘 (:07)
    # 並提前 23 分鐘，讓實際觸發時間能維持在 19:30 附近。
    # 參考: https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#schedule
    - cron: '7 11 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -r requirements-dev.txt

    - name: Smoke test (parser fixtures)
      run: pytest tests/test_parsers.py -q

    - name: Create Key File
      run: |
        echo '${{ secrets.GCP_CREDENTIALS }}' > service_account.json

    - name: Run Crawler (爬蟲)
      run: |
        python main.py

    - name: Run Notification (發送 LINE)
      env:
        # 這裡將 GitHub Secrets 注入到環境變數，讓 python 讀取
        LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: |
        python notify.py
